services:
  # --- 1. AI Backend (Flask) ---
  - type: web
    name: dr-detection-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn --bind 0.0.0.0:$PORT --timeout 60 app:app"
    plan: free
    envVars:
      - key: DATABASE_URL
        value: "postgresql://postgres.aovglxlifotjvymimayj:Dhanush%402404@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres"
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: "*" # To be restricted after first deploy

  # --- 2. Frontend Dashboard (React/Vite) ---
  - type: web
    name: dr-detection-ui
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://dr-detection-api-ck3g.onrender.com/api/"
